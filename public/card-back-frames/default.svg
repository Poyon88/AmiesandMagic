<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="matte" x1="0" y1="0" x2="0" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#060611"/>
      <stop offset="50%" stop-color="#14142a"/>
      <stop offset="100%" stop-color="#060611"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c664"/>
      <stop offset="50%" stop-color="#c8a84e"/>
      <stop offset="100%" stop-color="#8a6a20"/>
    </linearGradient>
  </defs>

  <!-- Matte band: outer 500x700 rect minus inner 410x580 window, fill evenodd -->
  <path d="M0 0 H500 V700 H0 Z M45 60 H455 V640 H45 Z"
        fill="url(#matte)" fill-rule="evenodd"/>

  <!-- Primary gold stroke hugging the inner window -->
  <rect x="45" y="60" width="410" height="580"
        fill="none" stroke="url(#gold)" stroke-width="2.5"/>

  <!-- Thin outer inset stroke for depth -->
  <rect x="38" y="53" width="424" height="594"
        fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>

  <!-- Outer edge stroke on the card itself -->
  <rect x="1" y="1" width="498" height="698"
        fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>

  <!-- Corner diamond ornaments -->
  <g fill="url(#gold)">
    <path d="M22 28 L32 38 L22 48 L12 38 Z"/>
    <path d="M478 28 L488 38 L478 48 L468 38 Z"/>
    <path d="M22 652 L32 662 L22 672 L12 662 Z"/>
    <path d="M478 652 L488 662 L478 672 L468 662 Z"/>
    <circle cx="22" cy="38" r="2" fill="#0a0a14"/>
    <circle cx="478" cy="38" r="2" fill="#0a0a14"/>
    <circle cx="22" cy="662" r="2" fill="#0a0a14"/>
    <circle cx="478" cy="662" r="2" fill="#0a0a14"/>
  </g>

  <!-- Mid-edge thin rails + central dot on each side -->
  <g stroke="url(#gold)" stroke-width="1" fill="none">
    <line x1="180" y1="30" x2="320" y2="30"/>
    <line x1="180" y1="670" x2="320" y2="670"/>
    <line x1="22" y1="260" x2="22" y2="440"/>
    <line x1="478" y1="260" x2="478" y2="440"/>
  </g>
  <g fill="url(#gold)">
    <circle cx="250" cy="30" r="4"/>
    <circle cx="250" cy="670" r="4"/>
    <circle cx="22" cy="350" r="4"/>
    <circle cx="478" cy="350" r="4"/>
  </g>
</svg>
